<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillsFuture Course Recommender</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem 0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
        }
        .nav-brand {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
        }
        .nav-items {
            display: flex;
            gap: 1rem;
        }
        .nav-item {
            color: white;
            background: none;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: background-color 0.2s;
        }
        .nav-item:hover:not(.disabled) {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .nav-item.active {
            background-color: rgba(255, 255, 255, 0.2);
        }
        .nav-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .nav-icon {
            width: 1.25rem;
            height: 1.25rem;
        }
        .page-container {
            min-height: calc(100vh - 80px);
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 2rem 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        .content-area {
            padding: 2rem 0;
        }
        .page-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 1rem;
        }
        .page-subtitle {
            font-size: 1.25rem;
            color: #718096;
            margin-bottom: 2rem;
        }
        .card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .card-shadow {
            box-shadow: 0 10px 25px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
        .feature-card {
            text-align: center;
            padding: 2rem;
            transition: transform 0.2s;
        }
        .feature-card:hover {
            transform: translateY(-4px);
        }
        .feature-icon {
            width: 3rem;
            height: 3rem;
            color: #667eea;
            margin: 0 auto 1rem;
        }
        .feature-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 1rem;
        }
        .feature-description {
            color: #718096;
            margin-bottom: 2rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background-color: #edf2f7;
            color: #4a5568;
        }
        .btn-secondary:hover:not(:disabled) {
            background-color: #e2e8f0;
        }
        .btn-outline {
            background-color: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn-outline:hover:not(:disabled) {
            background-color: #667eea;
            color: white;
        }
        .btn-disabled {
            background-color: #e2e8f0;
            color: #a0aec0;
            cursor: not-allowed;
        }
        .btn-full {
            width: 100%;
            justify-content: center;
        }
        .btn-icon {
            width: 1.25rem;
            height: 1.25rem;
        }
        .upload-area {
            border: 2px dashed #cbd5e0;
            border-radius: 1rem;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover {
            border-color: #667eea;
            background-color: #f7fafc;
        }
        .upload-icon {
            width: 4rem;
            height: 4rem;
            color: #a0aec0;
            margin: 0 auto 1rem;
        }
        .upload-text {
            font-size: 1.25rem;
            color: #4a5568;
            margin-bottom: 0.5rem;
        }
        .upload-hint {
            color: #718096;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            color: #2d3748;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 1rem;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }
        .form-hint {
            color: #718096;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .alert {
            padding: 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .alert-success {
            background-color: #f0fff4;
            color: #38a169;
            border: 1px solid #9ae6b4;
        }
        .alert-error {
            background-color: #fed7d7;
            color: #c53030;
            border: 1px solid #feb2b2;
        }
        .alert-icon {
            width: 1.25rem;
            height: 1.25rem;
        }
        .loading-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: inherit;
        }
        .slide-in {
            animation: slideIn 0.6s ease-out;
        }
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .hover-lift:hover {
            transform: translateY(-4px);
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 1rem;
        }
        .score-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 2rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
        }
        .score-display {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .score-breakdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        .score-item {
            background: #f7fafc;
            padding: 1rem;
            border-radius: 0.5rem;
            text-align: center;
        }
        .score-item-label {
            color: #718096;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }
        .score-item-value {
            color: #2d3748;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .course-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .course-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .course-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }
        .course-provider {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .course-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1rem 0;
        }
        .course-detail {
            text-align: center;
            padding: 0.5rem;
            background: #f7fafc;
            border-radius: 0.5rem;
        }
        .course-detail-label {
            font-size: 0.75rem;
            color: #718096;
            margin-bottom: 0.25rem;
        }
        .course-detail-value {
            font-weight: bold;
            color: #2d3748;
        }
        .course-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // API Configuration
        const API_BASE = 'http://localhost:8000';
        
        // Utility function to make API calls
        const apiCall = async (endpoint, options = {}) => {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers,
                    },
                });
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }
                
                return await response.json();
            } catch (error) {
                console.error('API call failed:', error);
                throw error;
            }
        };
        
        // Icon component
        const Icon = ({ name, className = "w-6 h-6", ...props }) => {
            const icons = {
                Upload: () => (
                    <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" {...props}>
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                ),
                Search: () => (
                    <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" {...props}>
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                ),
                History: () => (
                    <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" {...props}>
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                ),
                Home: () => (
                    <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" {...props}>
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                ),
                BookOpen: () => (
                    <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" {...props}>
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                ),
                TrendingUp: () => (
                    <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" {...props}>
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                    </svg>
                ),
                CheckCircle: () => (
                    <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" {...props}>
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                ),
                AlertCircle: () => (
                    <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" {...props}>
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                ),
                DollarSign: () => (
                    <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" {...props}>
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1" />
                    </svg>
                ),
                Clock: () => (
                    <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" {...props}>
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                ),
                Star: () => (
                    <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" {...props}>
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                    </svg>
                ),
                ExternalLink: () => (
                    <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" {...props}>
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                    </svg>
                )
            };
            
            const IconComponent = icons[name];
            return IconComponent ? <IconComponent /> : null;
        };

        // Navigation Component
        const Navigation = ({ currentPage, onPageChange, sessionData }) => {
            const navItems = [
                { id: 'home', label: 'Home', icon: 'Home' },
                { id: 'upload', label: 'Upload', icon: 'Upload' },
                { id: 'search', label: 'Search', icon: 'Search' },
                { id: 'history', label: 'History', icon: 'History' },
                { id: 'saved', label: 'Saved', icon: 'BookOpen' }
            ];

            return (
                <nav className="nav-container">
                    <div className="nav-content">
                        <button 
                            className="nav-brand"
                            onClick={() => onPageChange('home')}
                        >
                            SkillsFuture Course Recommender
                        </button>
                        
                        <div className="nav-items">
                            {navItems.map(item => (
                                <button
                                    key={item.id}
                                    className={`nav-item ${currentPage === item.id ? 'active' : ''}`}
                                    onClick={() => onPageChange(item.id)}
                                >
                                    <Icon name={item.icon} className="nav-icon" />
                                    <span className="hidden sm:inline">{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </nav>
            );
        };

        // Home Page Component
        const HomePage = ({ onPageChange, sessionData }) => {
            const features = [
                {
                    icon: 'Upload',
                    title: 'Upload Resume',
                    description: 'Upload your PDF resume and get detailed analysis with scoring and recommendations.',
                    action: 'Get Started',
                    page: 'upload'
                },
                {
                    icon: 'Search',
                    title: 'Search Courses',
                    description: 'Find relevant SkillsFuture courses based on your career goals and industry.',
                    action: 'Search Now',
                    page: 'search'
                },
                {
                    icon: 'History',
                    title: 'View History',
                    description: 'Access your previous analysis results and course recommendations.',
                    action: 'View History',
                    page: 'history'
                }
            ];

            return (
                <div className="page-container">
                    <div className="container content-area">
                        <div className="text-center slide-in">
                            <h1 className="page-title">
                                Welcome to SkillsFuture Course Recommender
                            </h1>
                            <p className="page-subtitle">
                                Get personalized course recommendations based on your resume analysis and career goals. 
                                Discover the best SkillsFuture courses to advance your career.
                            </p>
                        </div>

                        <div className="card-grid fade-in">
                            {features.map((feature, index) => (
                                <div key={index} className="feature-card card-shadow hover-lift">
                                    <Icon name={feature.icon} className="feature-icon" />
                                    <h3 className="feature-title">{feature.title}</h3>
                                    <p className="feature-description">{feature.description}</p>
                                    <button
                                        className="btn btn-primary btn-full"
                                        onClick={() => onPageChange(feature.page)}
                                    >
                                        <Icon name={feature.icon} className="btn-icon" />
                                        {feature.action}
                                    </button>
                                </div>
                            ))}
                        </div>

                        {sessionData.resumeScore && (
                            <div className="card card-shadow fade-in" style={{marginTop: '2rem'}}>
                                <div className="text-center">
                                    <h2 className="section-title">Recent Analysis</h2>
                                    <p style={{color: '#718096', marginBottom: '1.5rem'}}>
                                        Resume Score: {sessionData.resumeScore.overall_score}/100 
                                        ({sessionData.resumeScore.grade})
                                    </p>
                                    <div style={{display: 'flex', gap: '1rem', justifyContent: 'center', flexWrap: 'wrap'}}>
                                        <button
                                            className="btn btn-secondary"
                                            onClick={() => onPageChange('analysis')}
                                        >
                                            <Icon name="TrendingUp" className="btn-icon" />
                                            View Analysis
                                        </button>
                                        {sessionData.recommendations && (
                                            <button
                                                className="btn btn-primary"
                                                onClick={() => onPageChange('recommendations')}
                                            >
                                                <Icon name="BookOpen" className="btn-icon" />
                                                View Recommendations
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Real Upload Page with API Integration
        const UploadPage = ({ onResumeScored, onPageChange }) => {
            const [selectedFile, setSelectedFile] = useState(null);
            const [targetRole, setTargetRole] = useState('');
            const [targetIndustry, setTargetIndustry] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);

            const handleFileSelect = (event) => {
                const file = event.target.files[0];
                if (file && file.type === 'application/pdf') {
                    setSelectedFile(file);
                    setError(null);
                } else {
                    setError('Please select a PDF file');
                }
            };

            const handleAnalyze = async () => {
                console.log("Adding delay to space out requests...");
                await new Promise(resolve => setTimeout(resolve, 5000));
                if (!selectedFile) return;

                setIsLoading(true);
                setError(null);

                try {
                    // Create form data for file upload
                    console.log("Waiting to avoid rate limits...");
                    await new Promise(resolve => setTimeout(resolve, 5000)); // 5 second delay
                    const formData = new FormData();
                    formData.append('file', selectedFile);
                    if (targetRole) formData.append('target_role', targetRole);
                    if (targetIndustry) formData.append('target_industry', targetIndustry);
                    formData.append('experience_level', 'Mid');
                    

                    // Call resume scoring API
                    const response = await fetch(`${API_BASE}/resume/score`, {
                        method: 'POST',
                        body: formData,
                    });

                    if (!response.ok) {
                        throw new Error(`Server error: ${response.status}`);
                    }

                    const resumeScore = await response.json();
                    
                    // Save to session data and navigate to analysis page
                    onResumeScored(resumeScore, targetRole, targetIndustry);
                    onPageChange('analysis');

                } catch (err) {
                    setError(`Analysis failed: ${err.message}`);
                    console.error('Resume analysis error:', err);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="page-container">
                    <div className="container content-area">
                        <div className="text-center slide-in">
                            <h1 className="page-title">Upload Your Resume</h1>
                            <p className="page-subtitle">
                                Upload your PDF resume to get detailed analysis and personalized course recommendations.
                            </p>
                        </div>

                        <div style={{maxWidth: '32rem', margin: '0 auto'}}>
                            <div className="card card-shadow fade-in">
                                <div className="upload-area" onClick={() => document.getElementById('file-upload').click()}>
                                    <Icon name="Upload" className="upload-icon" />
                                    <div className="upload-text">
                                        {selectedFile ? selectedFile.name : 'Click to upload your resume'}
                                    </div>
                                    <div className="upload-hint">
                                        PDF files only, max 10MB
                                    </div>
                                    <input
                                        id="file-upload"
                                        type="file"
                                        accept=".pdf"
                                        onChange={handleFileSelect}
                                        style={{ display: 'none' }}
                                    />
                                </div>

                                {selectedFile && (
                                    <div className="alert alert-success" style={{marginTop: '1rem'}}>
                                        <Icon name="CheckCircle" className="alert-icon" />
                                        <span>Resume uploaded successfully: {selectedFile.name}</span>
                                    </div>
                                )}

                                {error && (
                                    <div className="alert alert-error" style={{marginTop: '1rem'}}>
                                        <Icon name="AlertCircle" className="alert-icon" />
                                        <span>{error}</span>
                                    </div>
                                )}

                                <div style={{marginTop: '1.5rem'}}>
                                    <div className="form-group">
                                        <label className="form-label">Target Role (Optional)</label>
                                        <input
                                            type="text"
                                            className="form-input"
                                            placeholder="e.g., Data Scientist, Product Manager"
                                            value={targetRole}
                                            onChange={(e) => setTargetRole(e.target.value)}
                                        />
                                        <div className="form-hint">
                                            Specify your target role for more accurate analysis
                                        </div>
                                    </div>

                                    <div className="form-group">

                        </div>

                        <div className="space-y-4 fade-in">
                            {sessionData.analysisHistory.map((analysis, index) => (
                                <div key={analysis.id} className="card card-shadow">
                                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start'}}>
                                        <div>
                                            <h3 style={{color: '#2d3748', marginBottom: '0.5rem'}}>
                                                Analysis #{sessionData.analysisHistory.length - index}
                                            </h3>
                                            <div style={{display: 'flex', alignItems: 'center', marginBottom: '1rem'}}>
                                                <div style={{
                                                    backgroundColor: '#667eea',
                                                    color: 'white',
                                                    padding: '0.5rem 1rem',
                                                    borderRadius: '0.5rem',
                                                    marginRight: '1rem',
                                                    fontWeight: 'bold'
                                                }}>
                                                    {analysis.resumeScore.grade}
                                                </div>
                                                <div>
                                                    <div style={{fontWeight: 'bold'}}>{analysis.resumeScore.overall_score}/100</div>
                                                    <div style={{fontSize: '0.875rem', color: '#718096'}}>Overall Score</div>
                                                </div>
                                            </div>
                                            <div style={{fontSize: '0.875rem', color: '#718096'}}>
                                                {new Date(analysis.timestamp).toLocaleString()}
                                            </div>
                                            {analysis.targetRole && (
                                                <p style={{color: '#4a5568', marginTop: '0.5rem'}}>
                                                    <strong>Target Role:</strong> {analysis.targetRole}
                                                </p>
                                            )}
                                        </div>
                                        <div style={{display: 'flex', gap: '0.5rem'}}>
                                            <button
                                                className="btn btn-secondary"
                                                onClick={() => {
                                                    onSelectAnalysis(analysis);
                                                    onPageChange('analysis');
                                                }}
                                            >
                                                View Details
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };
        
        const SavedCoursesPage = ({ savedCourses, onRemoveCourse }) => {
            if (savedCourses.length === 0) {
                return (
                    <div className="page-container">
                        <div className="container content-area">
                            <div className="text-center">
                                <h1 className="page-title">Saved Courses</h1>
                                <p className="page-subtitle">You haven't saved any courses yet.</p>
                                <Icon name="BookOpen" style={{width: '4rem', height: '4rem', color: '#cbd5e0', margin: '2rem auto'}} />
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="page-container">
                    <div className="container content-area">
                        <div className="text-center slide-in">
                            <h1 className="page-title">Saved Courses</h1>
                            <p className="page-subtitle">Your saved SkillsFuture courses ({savedCourses.length})</p>
                        </div>

                        <div className="fade-in">
                            {savedCourses.map((course, index) => (
                                <div key={course.id} className="course-card">
                                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start'}}>
                                        <div style={{flex: 1}}>
                                            <h3 className="course-title">{course.title}</h3>
                                            <div className="course-provider">{course.provider}</div>
                                            <div style={{color: '#718096', fontSize: '0.875rem'}}>
                                                Saved on {new Date(course.savedAt).toLocaleDateString()}
                                            </div>
                                        </div>
                                        <div style={{display: 'flex', gap: '1rem', marginTop: '1rem'}}>
                                            {course.url && (
                                                <a href={course.url} target="_blank" rel="noopener noreferrer" className="btn btn-primary">
                                                    <Icon name="ExternalLink" className="btn-icon" />
                                                    View Course
                                                </a>
                                            )}
                                            <button
                                                className="btn btn-outline"
                                                onClick={() => onRemoveCourse(course.id)}
                                                style={{color: '#dc2626', borderColor: '#dc2626'}}
                                            >
                                                Remove
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // Main App Component with Session Management
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [sessionData, setSessionData] = useState({
                currentAnalysis: null, // Current/latest analysis
                analysisHistory: [],   // Array of all analyses
                recommendations: null,
                careerGoal: null
            });
            const [savedCourses, setSavedCourses] = useState([]);

            const handleResumeScored = (resumeScore, targetRole, targetIndustry) => {
                const newAnalysis = {
                    id: Date.now(), // Simple ID
                    resumeScore,
                    targetRole,
                    targetIndustry,
                    extractedSkills: resumeScore.extracted_skills || [],
                    timestamp: new Date().toISOString(),
                    recommendations: null
                };
                
                setSessionData(prev => ({
                    ...prev,
                    currentAnalysis: newAnalysis,
                    analysisHistory: [...prev.analysisHistory, newAnalysis]
                }));
            };

            const handleGetRecommendations = (recommendations, careerGoal) => {
                setSessionData(prev => ({
                    ...prev,
                    recommendations,
                    careerGoal
                }));
            };

            const handleSaveCourse = (course) => {
                const courseToSave = {
                    id: course.id,
                    title: course.title,
                    provider: course.provider,
                    price: course.price,
                    url: course.url,
                    savedAt: new Date().toISOString()
                };
                
                if (!savedCourses.find(c => c.id === course.id)) {
                    setSavedCourses(prev => [...prev, courseToSave]);
                }
            };

            const handleRemoveCourse = (courseId) => {
                setSavedCourses(prev => prev.filter(c => c.id !== courseId));
            };

            const renderPage = () => {
                switch (currentPage) {
                    case 'upload':
                        return <UploadPage onResumeScored={handleResumeScored} onPageChange={setCurrentPage} />;
                    case 'analysis':
                        return <AnalysisPage sessionData={sessionData} onGetRecommendations={handleGetRecommendations} onPageChange={setCurrentPage} />;
                    case 'search':
                        return <SearchPage onGetRecommendations={handleGetRecommendations} onPageChange={setCurrentPage} />;
                    case 'recommendations':
                        return <RecommendationsPage sessionData={sessionData} onSaveCourse={handleSaveCourse} />;
                    case 'history':
                        return <HistoryPage 
                            sessionData={sessionData} 
                            onPageChange={setCurrentPage}
                            onSelectAnalysis={(analysis) => {
                                setSessionData(prev => ({...prev, currentAnalysis: analysis}));
                            }}
                        />;
                    case 'saved':
                        return <SavedCoursesPage savedCourses={savedCourses} onRemoveCourse={handleRemoveCourse} />;
                    default:
                        return <HomePage onPageChange={setCurrentPage} sessionData={sessionData} />;
                }
            };

            return (
                <div>
                    <Navigation currentPage={currentPage} onPageChange={setCurrentPage} sessionData={sessionData} />
                    {renderPage()}
                </div>
            );
        };

        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
